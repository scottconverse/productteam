# Evaluation Report Template
# Generated by the Evaluator skill in the ProductTeam pipeline.
# Save to: .claude/evaluations/eval-NNN.yaml
#
# The Evaluator grades the Builder's work against the sprint contract.
# Verdict: PASS | NEEDS_WORK | FAIL

sprint:                        # Sprint number being evaluated
evaluator_verdict:             # PASS | NEEDS_WORK | FAIL
loop_iteration:                # 1-3 (which review cycle this is)
max_loops: 3
timestamp: ""                  # YYYY-MM-DD HH:MM

test_results:
  total:                       # Total number of tests
  passed:                      # Number passing
  failed:                      # Number failing
  warnings:                    # Number of warnings
  warning_details: ""          # Brief description if any

acceptance_criteria:
  # One entry per criterion from the sprint contract.
  # Status is PASS or FAIL — no partial credit.
  #
  # - criterion: "exact text from sprint contract"
  #   status: PASS
  #   evidence: "what you checked and found"
  # - criterion: "next criterion"
  #   status: FAIL
  #   evidence: "what's wrong and where"

additional_findings:
  # Problems found beyond the acceptance criteria.
  #
  # - severity: CRITICAL | HIGH | MEDIUM | LOW
  #   file: "path/to/file.py"
  #   location: "function_name or line range"
  #   finding: "what's wrong"
  #   suggestion: "how to fix it"

blind_spots:
  # What the test suite does NOT cover.
  #
  # - "edge case or scenario that nobody tested"

summary: |
  # 2-3 sentence overall assessment.
  # Be direct. If it's not ready, say why. If it is, say what convinced you.
